upstream ziply5_next_upstream {
    server 127.0.0.1:5001;
    keepalive 128;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 150m;
    keepalive_timeout 65;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Basic bot mitigation pattern
    if ($http_user_agent ~* "(sqlmap|nikto|masscan|zgrab|acunetix)") {
        return 403;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Compression
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # If nginx has ngx_brotli module installed:
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # Serve local product assets directly (bypasses Node for media traffic).
    location /api/v1/uploads/ {
        alias /var/www/assets/;
        autoindex off;
        disable_symlinks on;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Accel-Expires 31536000;
        try_files $uri @next;
    }

    # Long-lived static cache for Next public build assets.
    location /_next/static/ {
        proxy_pass http://ziply5_next_upstream;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Tighter limit for auth endpoints.
    location ~* ^/api/v1/auth/ {
        limit_req zone=auth_limit burst=25 nodelay;
        proxy_pass http://ziply5_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API limit.
    location ~* ^/api/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass http://ziply5_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://ziply5_next_upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location @next {
        proxy_pass http://ziply5_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
